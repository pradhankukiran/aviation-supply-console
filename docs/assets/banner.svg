  <path d="M78 586c200-68 364-154 489-328 65-90 141-168 218-218 110-74 224-117 385-151" fill="none" stroke="url(#accent)" stroke-width="18"/>
  <circle cx="1298" cy="154" r="13" fill="#f1a15d"/>
  <g transform="translate(1080 120)">
    <path
